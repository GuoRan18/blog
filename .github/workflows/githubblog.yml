name: Githubblog

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Setup Pagefind
        run: npm install -g pagefind

      - name: Index with Pagefind
        run: pagefind --site public

      - name: Verify Pagefind files
        run: |
          echo "=== Pagefind files ==="
          ls -la public/pagefind/
          echo "=== File count ==="
          find public/pagefind -type f | wc -l

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: koobaiblog
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
