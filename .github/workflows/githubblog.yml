name: Githubblog

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Setup Pagefind
        run: npx -y pagefind --version

      - name: Index with Pagefind
        run: npx pagefind --site public

      - name: Verify Pagefind files
        run: |
          echo "=== Pagefind directory ==="
          ls -la public/pagefind/
          echo "=== Checking for pagefind files ==="
          find public/pagefind -type f -name "*.js" -o -name "*.css" | head -10

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ./public --project-name=koobaiblog --commit-dirty=true
