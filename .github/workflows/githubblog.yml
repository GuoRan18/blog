name: Githubblog

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build and Index
        run: |
          hugo --minify
          npm install -g pagefind
          pagefind --site public
          echo "=== Pagefind files ==="
          ls -la public/pagefind/
          echo "=== File count ==="
          find public/pagefind -type f | wc -l

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ./public --project-name=koobaiblog
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
