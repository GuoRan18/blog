name: Githubblog

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Setup Pagefind
        run: npm install -g pagefind

      - name: Index with Pagefind
        run: pagefind --site public

      - name: Verify Pagefind files
        run: |
          echo "=== Checking pagefind directory ==="
          ls -la public/pagefind/
          echo ""
          echo "=== Count pagefind files ==="
          find public/pagefind -type f | wc -l
          echo ""
          echo "=== List all files ==="
          find public/pagefind -type f -exec echo {} \;

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ./public --project-name=koobaiblog --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
