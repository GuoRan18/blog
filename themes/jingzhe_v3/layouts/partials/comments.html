<!-- CWD 评论系统 -->
<div id="comments"></div>

<script src="https://cdn.jsdelivr.net/npm/cwd-widget@0.0.x/dist/cwd.js"></script>
<script>
(function() {
  var comments = new CWDComments({
    el: '#comments',
    apiBaseUrl: 'https://cwd-api.i4017.workers.dev',
    siteId: '4op-blog',
    postSlug: window.location.pathname,
    lang: 'zh-CN',
    theme: 'light',
    pageSize: 20
  });
  comments.mount();
})();
</script>
