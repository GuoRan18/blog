# GitHub API 代理 + 又拍云上传 Worker
name = "blog-github-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# 环境变量（部署后通过 Cloudflare Dashboard 设置，不要写在这里提交到 Git）
# [vars]
# ADMIN_TOKEN = "你的管理密钥"
# GITHUB_TOKEN = "你的 GitHub PAT"
# UPYUN_OPERATOR = "又拍云操作员名"
# UPYUN_PASSWORD = "又拍云操作员密码"
# UPYUN_BUCKET = "又拍云桶名"
# UPYUN_DOMAIN = "又拍云域名 如 https://img.yourdomain.com"
